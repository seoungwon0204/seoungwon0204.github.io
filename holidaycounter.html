<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-Day Counter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #191919;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .counter {
      background: #1e1e1e;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      text-align: center;
      max-width: 200px;
      width: 80%;
    }
    .counter h1 {
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }
    .countdown {
      font-weight: bold;
      text-shadow: 0 0 4px rgba(255, 255, 255, 0.3);
      transition: font-size 0.3s ease;
    }
    @media (max-width: 600px) {
      .counter {
        padding: 0.8rem;
      }
      .counter h1 {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="counter">
    <h1>다음 공휴일</h1>
    <div class="countdown" id="countdown">Loading...</div>
  </div>
<script>
  function hslToRgb(h, s, l) {
    h /= 360;
    s /= 100;
    l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => {
      const k = (n + h * 12) % 12;
      return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    };
    return [
      Math.round(f(0) * 255),
      Math.round(f(8) * 255),
      Math.round(f(4) * 255)
    ];
  }

  function updateRainbowColor() {
    const now = Date.now();
    const cycleTime = 60000;
    const hue = (now % cycleTime) / cycleTime * 360;
    const [r, g, b] = hslToRgb(hue, 100, 50);
    document.getElementById('countdown').style.color = `rgb(${r}, ${g}, ${b})`;
  }

  // 2026 Holidays (month is 0-based)
  const holidays = [
    new Date(2026, 1, 16),  // 2/16
    new Date(2026, 2, 2),   // 3/2
    new Date(2026, 4, 1),   // 5/1
    new Date(2026, 4, 5),   // 5/5
    new Date(2026, 4, 25),  // 5/25
    new Date(2026, 7, 17),  // 8/17
    new Date(2026, 8, 24),  // 9/24
    new Date(2026, 9, 5),   // 10/5
    new Date(2026, 9, 9),   // 10/9
    new Date(2026, 11, 25)  // 12/25
  ];

  function updateCountdown() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const nextHoliday = holidays.find(date => date >= today);

    if (!nextHoliday) {
      document.getElementById('countdown').textContent = "No more holidays 🎉";
      return;
    }

    const diffTime = nextHoliday - today;
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    // Font size logic
    let fontSize;
    if (diffDays >= 50) {
      fontSize = 10;
    } else if (diffDays <= 1) {
      fontSize = 50;
    } else {
      fontSize = 10 + (40 * (50 - diffDays) / 49);
    }

    const el = document.getElementById('countdown');
    el.textContent = `D-${diffDays}`;
    el.style.fontSize = `${fontSize}pt`;
  }

  updateCountdown();
  updateRainbowColor();

  setInterval(updateCountdown, 60 * 60 * 1000);
  setInterval(updateRainbowColor, 100);
</script>

</body>
</html>
