<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer</title>
  <style>
    :root {
      --quick-hours: 9;         /* 빠른 설정 버튼 기준 시간 */
      color-scheme: dark;
    }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      font-family: Arial, sans-serif;
      background: #191919;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .counter {
      position: relative;
      background: #1e1e1e;
      padding: 1.4rem 1.8rem;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      text-align: center;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      user-select: none;
    }
    .counter:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      background: #242424;
    }

    /* ===== 카운트다운 표시 ===== */
    .time {
      font-weight: bold;
      font-size: 2.6rem;
      letter-spacing: 1px;
      font-variant-numeric: tabular-nums;
      color: var(--c, #ffffff);
      text-shadow: 0 0 6px var(--glow, rgba(255, 255, 255, 0.35));
      transition: transform 0.2s ease, text-shadow 0.2s ease;
    }
    .time:hover {
      transform: scale(1.06);
      text-shadow: 0 0 16px var(--glow, rgba(255, 255, 255, 0.7));
    }

    /* ===== 진행 게이지 ===== */
    .gauge {
      margin-top: 0.7rem;
      width: 100%;
      height: 5px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }
    .gauge-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: var(--c, #ffffff);
      box-shadow: 0 0 6px var(--glow, rgba(255, 255, 255, 0.4));
      transition: width 0.5s linear, background 0.5s ease, box-shadow 0.5s ease;
    }

    /* ===== 설정 단계 ===== */
    .setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
    }
    .row {
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }
    .tinput {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 0.45rem 0.55rem;
      font-size: 1.3rem;
      font-family: inherit;
      font-variant-numeric: tabular-nums;
      text-align: center;
      transition: border-color 0.2s ease;
    }
    .tinput:focus {
      outline: none;
      border-color: #7fd7ff;
    }
    .go {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 0.45rem 0.7rem;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    .go:hover {
      background: #3a3a3a;
      border-color: #7fd7ff;
      color: #fff;
    }
    .quick {
      font-size: 0.72rem;
      color: #888;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .quick:hover {
      color: #fff;
      background: #333;
    }

    /* ===== 리셋 버튼 ===== */
    .reset {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: #666;
      font-size: 0.8rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }
    .counter:hover .reset { opacity: 0.5; }
    .reset:hover {
      opacity: 1;
      color: #fff;
      transform: rotate(-90deg);
    }

    .hidden { display: none !important; }

    /* ===== 컨페티 ===== */
    #confetti {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="counter">
    <div class="reset hidden" id="reset" title="reset">&#8635;</div>

    <!-- 설정 단계 -->
    <div class="setup" id="setup">
      <div class="row">
        <input type="time" id="target" class="tinput">
        <button class="go" id="go">시작</button>
      </div>
      <div class="quick" id="quick">지금으로부터 9시간 뒤</div>
    </div>

    <!-- 카운트다운 -->
    <div class="time hidden" id="time">00:00:00</div>
    <div class="gauge hidden" id="gauge"><div class="gauge-fill" id="gaugeFill"></div></div>
  </div>

  <canvas id="confetti"></canvas>

<script>
  const KEY = 'countdown_end_v1';
  const QUICK_HOURS = parseFloat(
    getComputedStyle(document.documentElement).getPropertyValue('--quick-hours')
  ) || 9;

  const setupEl = document.getElementById('setup');
  const timeEl  = document.getElementById('time');
  const gaugeEl = document.getElementById('gauge');
  const gaugeFill = document.getElementById('gaugeFill');
  const resetEl = document.getElementById('reset');
  const targetInput = document.getElementById('target');
  const goBtn   = document.getElementById('go');
  const quickBtn = document.getElementById('quick');

  quickBtn.textContent = `지금으로부터 ${QUICK_HOURS}시간 뒤`;

  // ===== 컨페티 엔진 (한 번 발사) =====
  const confettiCanvas = document.getElementById('confetti');
  const cctx = confettiCanvas.getContext('2d');
  let confettiParticles = [];
  let confettiRAF = null;

  function sizeCanvas() {
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', sizeCanvas);
  sizeCanvas();

  function fireConfetti() {
    sizeCanvas();
    const W = confettiCanvas.width;
    const H = confettiCanvas.height;
    const colors = ['#7fd7ff', '#ffd166', '#ff6b6b', '#a0e57f', '#c792ea', '#ffffff'];
    const count = 140;
    confettiParticles = [];
    for (let i = 0; i < count; i++) {
      const angle = Math.PI * (1.0 + Math.random() * 1.0); // 위쪽으로 발사
      const speed = 4 + Math.random() * 4.5;
      confettiParticles.push({
        x: W / 2 + (Math.random() - 0.5) * 80,
        y: H * 0.62,
        vx: Math.cos(angle) * speed + (Math.random() - 0.5) * 2,
        vy: Math.sin(angle) * speed - 2,
        size: 5 + Math.random() * 6,
        color: colors[(Math.random() * colors.length) | 0],
        rot: Math.random() * Math.PI,
        vrot: (Math.random() - 0.5) * 0.18,
        life: 0
      });
    }
    if (!confettiRAF) confettiRAF = requestAnimationFrame(animateConfetti);
  }

  function animateConfetti() {
    cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    let alive = 0;
    for (const p of confettiParticles) {
      p.vy += 0.12;          // 중력
      p.vx *= 0.985;         // 공기저항
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vrot;
      p.life += 1;
      const alpha = Math.max(0, 1 - p.life / 240);
      if (alpha <= 0 || p.y > confettiCanvas.height + 20) continue;
      alive++;
      cctx.save();
      cctx.globalAlpha = alpha;
      cctx.translate(p.x, p.y);
      cctx.rotate(p.rot);
      cctx.fillStyle = p.color;
      cctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      cctx.restore();
    }
    if (alive > 0) {
      confettiRAF = requestAnimationFrame(animateConfetti);
    } else {
      cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      confettiParticles = [];
      confettiRAF = null;
    }
  }

  // 이 목표(end)에 대해 컨페티를 이미 터뜨렸는지 기록
  const CELEB_KEY = 'countdown_celebrated_v1';

  function getEnd() {
    const v = localStorage.getItem(KEY);
    return v ? parseInt(v, 10) : null;
  }
  function setEnd(ms) {
    try { localStorage.setItem(KEY, String(ms)); } catch (e) {}
    render();
  }
  function clearEnd() {
    try { localStorage.removeItem(KEY); } catch (e) {}
    render();
  }

  function fmt(ms) {
    const s = Math.max(0, Math.floor(ms / 1000));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const p = n => String(n).padStart(2, '0');
    return `${p(h)}:${p(m)}:${p(sec)}`;
  }

  // 남은 비율(0~1)에 따라 색을 청록 -> 호박색으로 은은하게 이동
  function colorFor(frac) {
    frac = Math.max(0, Math.min(1, frac));
    const hue = 40 + (190 - 40) * frac;
    return {
      c: `hsl(${hue}, 70%, 62%)`,
      glow: `hsla(${hue}, 80%, 60%, 0.55)`
    };
  }

  // 설정 입력창 기본값: 지금으로부터 QUICK_HOURS 시간 뒤의 시각
  function prefillInput() {
    const d = new Date(Date.now() + QUICK_HOURS * 3600 * 1000);
    const p = n => String(n).padStart(2, '0');
    targetInput.value = `${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  // HH:MM 입력 -> 오늘 그 시각(이미 지났으면 다음 날)의 타임스탬프
  function targetFromInput() {
    const v = targetInput.value;
    if (!v) return null;
    const [h, m] = v.split(':').map(Number);
    const d = new Date();
    d.setHours(h, m, 0, 0);
    if (d.getTime() <= Date.now()) d.setDate(d.getDate() + 1);
    return d.getTime();
  }

  // 색 기준이 되는 전체 길이: 설정 시점의 남은 시간을 저장해 둠
  const SPAN_KEY = 'countdown_span_v1';
  function getSpan() {
    const v = localStorage.getItem(SPAN_KEY);
    return v ? parseInt(v, 10) : (QUICK_HOURS * 3600 * 1000);
  }
  function startWithEnd(endMs) {
    try { localStorage.setItem(SPAN_KEY, String(Math.max(1, endMs - Date.now()))); } catch (e) {}
    setEnd(endMs);
  }

  function render() {
    const end = getEnd();

    // 설정 단계
    if (end === null) {
      setupEl.classList.remove('hidden');
      timeEl.classList.add('hidden');
      gaugeEl.classList.add('hidden');
      resetEl.classList.add('hidden');
      return;
    }

    // 카운트다운 단계
    setupEl.classList.add('hidden');
    timeEl.classList.remove('hidden');
    gaugeEl.classList.remove('hidden');
    resetEl.classList.remove('hidden');

    const span = getSpan();
    const remaining = Math.max(0, end - Date.now());
    const progress = Math.max(0, Math.min(1, 1 - remaining / span)); // 목표에 가까울수록 1

    const col = colorFor(remaining <= 0 ? 0 : remaining / span);
    timeEl.textContent = fmt(remaining);
    timeEl.style.setProperty('--c', col.c);
    timeEl.style.setProperty('--glow', col.glow);

    gaugeFill.style.width = (progress * 100) + '%';
    gaugeFill.style.setProperty('--c', col.c);
    gaugeFill.style.setProperty('--glow', col.glow);

    // 0 도달 시 이 목표에 대해 한 번만 컨페티 발사
    if (remaining <= 0 && localStorage.getItem(CELEB_KEY) !== String(end)) {
      try { localStorage.setItem(CELEB_KEY, String(end)); } catch (e) {}
      fireConfetti();
    }
  }

  // 수동 시작: 입력한 시각까지
  goBtn.addEventListener('click', () => {
    const t = targetFromInput();
    if (t) startWithEnd(t);
  });

  // 빠른 설정: 지금 + QUICK_HOURS 시간
  quickBtn.addEventListener('click', () => {
    startWithEnd(Date.now() + QUICK_HOURS * 3600 * 1000);
  });

  // 리셋 -> 설정 단계로
  resetEl.addEventListener('click', (e) => {
    e.stopPropagation();
    try { localStorage.removeItem(CELEB_KEY); } catch (e) {}
    clearEnd();
    prefillInput();
  });

  prefillInput();
  render();
  setInterval(render, 500);
</script>
</body>
</html>
